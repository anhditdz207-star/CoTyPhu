<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<title>Cờ Tỷ Phú 3D - Demo</title>
<style>
  :root{
    --wood-1:#8a5a34; --wood-2:#6e4526; --cream:#f3ecd8;
    --p1:#2f6fed; --p2:#c0293d; --p3:#e0b400; --p4:#2fa84f;
    --panel-bg: rgba(30,20,10,0.72);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;font-family:'Segoe UI', Roboto, Arial, sans-serif;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(255,220,160,0.12), transparent 60%),
      repeating-linear-gradient(100deg, var(--wood-1) 0 22px, var(--wood-2) 22px 44px);
  }
  #canvas-wrap{position:absolute;inset:0;}
  canvas{display:block;width:100%;height:100%;}

  .hud{position:absolute;inset:0;pointer-events:none;font-variant-numeric:tabular-nums;}
  .player-card{
    position:absolute;pointer-events:auto;display:flex;align-items:center;gap:10px;
    background:var(--panel-bg);border-radius:14px;padding:8px 14px 8px 8px;
    color:#fff;box-shadow:0 6px 16px rgba(0,0,0,0.35);border:2px solid transparent;
    transition:transform .2s, border-color .2s, box-shadow .2s;
    min-width:150px;
  }
  .player-card.active{transform:scale(1.06);box-shadow:0 0 0 3px #fff5, 0 8px 20px rgba(0,0,0,.5);}
  .avatar{width:38px;height:38px;border-radius:50%;flex:0 0 38px;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:16px;color:#fff;border:2px solid rgba(255,255,255,.6);}
  .pname{font-weight:700;font-size:14px;line-height:1.15;}
  .pinfo{font-size:12px;opacity:.85;line-height:1.3;}

  #p0{top:18px;left:18px;} #p0 .avatar{background:var(--p1);}
  #p1{top:18px;right:18px;} #p1 .avatar{background:var(--p2);}
  #p2{bottom:18px;left:18px;} #p2 .avatar{background:var(--p3);color:#4a3900;}
  #p3{bottom:18px;right:18px;} #p3 .avatar{background:var(--p4);}

  #turn-banner{
    position:absolute;top:18px;left:50%;transform:translateX(-50%);pointer-events:none;
    background:var(--panel-bg);color:#fff;padding:8px 22px;border-radius:999px;
    font-weight:700;font-size:14px;letter-spacing:.3px;box-shadow:0 6px 16px rgba(0,0,0,.35);
    white-space:nowrap;
  }
  #turn-banner b{color:#ffd76b;}

  #toast{
    position:absolute;top:64px;left:50%;transform:translateX(-50%);pointer-events:none;
    background:rgba(20,120,60,0.92);color:#fff;padding:8px 18px;border-radius:10px;
    font-size:13px;font-weight:600;opacity:0;transition:opacity .35s, transform .35s;
    box-shadow:0 6px 14px rgba(0,0,0,.35);
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(4px);}

  #card-popup{
    position:absolute; top:50%; left:50%; z-index:70; pointer-events:none;
    width:min(84vw,320px); padding:22px 22px 24px; border-radius:16px; text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.5);
    transform:translate(-50%,-50%) scale(0.4) rotate(-8deg); opacity:0;
    transition:transform .38s cubic-bezier(.34,1.56,.64,1), opacity .3s;
  }
  #card-popup.show{ transform:translate(-50%,-50%) scale(1) rotate(0deg); opacity:1; }
  #card-popup .cp-icon{ font-size:44px; margin-bottom:6px; }
  #card-popup .cp-label{ font-weight:800; font-size:15px; letter-spacing:1px; margin-bottom:10px; }
  #card-popup .cp-text{ font-size:15px; font-weight:600; line-height:1.45; }
  #card-popup.chance{ background:linear-gradient(180deg,#fff4e0,#ffe3ad); border:4px solid #e8a622; color:#5a3d10; }
  #card-popup.chest{ background:linear-gradient(180deg,#fff9e0,#ffe98f); border:4px solid #c9a000; color:#5a4a10; }

  #controls{
    position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
    display:flex;flex-direction:column;align-items:center;gap:10px;pointer-events:auto;
  }
  .dice-row{display:flex;gap:14px;align-items:center;}
  .die-face{
    width:52px;height:52px;border-radius:10px;background:linear-gradient(145deg,#fff,#e6e2d8);
    display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#222;
    box-shadow:0 4px 10px rgba(0,0,0,.4), inset 0 0 0 2px #cfc8b6;
  }
  #roll-btn{
    background:linear-gradient(180deg,#ffce54,#e8a622);border:none;color:#4a2e00;font-weight:800;
    font-size:15px;padding:12px 26px;border-radius:999px;cursor:pointer;
    box-shadow:0 6px 14px rgba(0,0,0,.4);letter-spacing:.3px;
  }
  #roll-btn:disabled{filter:grayscale(.6) brightness(.8);cursor:not-allowed;}
  #roll-btn:not(:disabled):hover{filter:brightness(1.08);}

  #cam-controls{
    position:absolute;top:18px;left:50%;transform:translate(-50%, 46px);
    display:flex;gap:8px;pointer-events:auto;
  }
  .cam-btn{
    background:rgba(20,15,10,.6);color:#fff;border:1px solid rgba(255,255,255,.25);
    padding:6px 14px;border-radius:999px;font-size:12px;cursor:pointer;font-weight:600;
  }
  .cam-btn.active{background:#e8a622;color:#3a2400;border-color:transparent;}

  #hint{
    position:absolute;bottom:18px;left:18px;color:#fff;font-size:11px;opacity:.65;
    pointer-events:none;max-width:200px;line-height:1.4;
  }

  #setup-overlay{
    position:absolute;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 20%, rgba(80,50,20,0.55), rgba(10,6,3,0.88));
  }
  #setup-card{
    width:min(94vw, 460px);background:#fbf3de;border-radius:20px;padding:26px 26px 22px;
    box-shadow:0 20px 50px rgba(0,0,0,.5);border:4px solid #c9a24a;
    max-height:88vh;overflow-y:auto;
  }
  #setup-card h1{margin:0 0 4px;font-size:22px;color:#7a2e1f;letter-spacing:.3px;}
  #setup-card .sub{margin:0 0 18px;font-size:12.5px;color:#7a6a4a;}
  .setup-label{font-size:12px;font-weight:700;color:#5a4526;text-transform:uppercase;letter-spacing:.6px;margin:14px 0 8px;}
  .count-row{display:flex;gap:8px;}
  .count-btn{
    flex:1;padding:10px 0;border-radius:10px;border:2px solid #d8c896;background:#fff;
    font-weight:800;font-size:15px;color:#7a6a4a;cursor:pointer;
  }
  .count-btn.active{background:#e8a622;border-color:#c9861a;color:#3a2400;}
  .slot-row{
    display:flex;align-items:center;gap:10px;background:#fff;border-radius:12px;
    padding:8px 10px;margin-bottom:8px;border:2px solid #ecdfb8;
  }
  .slot-dot{width:26px;height:26px;border-radius:50%;flex:0 0 26px;border:2px solid rgba(0,0,0,.15);}
  .slot-name{flex:1;font-weight:700;font-size:14px;color:#3a2b16;}
  .slot-toggle{
    display:flex;border-radius:999px;overflow:hidden;border:2px solid #d8c896;
  }
  .slot-toggle button{
    border:none;background:#fff;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;color:#8a7a54;
  }
  .slot-toggle button.active{background:#2fa84f;color:#fff;}
  .slot-toggle button.active.bot{background:#c0293d;}
  #setup-sound{display:flex;gap:10px;margin-top:6px;}
  .setup-sound-btn{
    flex:1;padding:9px 0;border-radius:10px;border:2px solid #d8c896;background:#fff;
    font-weight:700;font-size:12.5px;color:#5a4526;cursor:pointer;
  }
  .setup-sound-btn.active{background:#4c8ce0;color:#fff;border-color:#3068ba;}
  #start-btn{
    margin-top:18px;width:100%;padding:13px 0;border:none;border-radius:999px;
    background:linear-gradient(180deg,#ffce54,#e8a622);color:#4a2e00;font-weight:800;font-size:15px;
    cursor:pointer;box-shadow:0 6px 14px rgba(0,0,0,.35);
  }

  #sound-controls{
    position:absolute;top:18px;right:18px;transform:translateY(46px);
    display:flex;gap:8px;pointer-events:auto;
  }
</style>

<script>
(function(){
"use strict";

/* ============================= BOARD DATA ============================= */
// 40 tiles, transcribed directly from the user's clear board photo (GO at bottom-left, clockwise)
const GROUP_COLORS = {
  red:'#e0525a', gray:'#b9b9b9', blue:'#4a86e8', green:'#2fa84f',
  orange:'#f5a326', yellow:'#f6df2c', cyan:'#29b6d8', navy:'#1f3fae'
};
const TILES = [
  {t:'go',    n:'Bắt Đầu / Đi Qua Nhận $200'},
  {t:'prop',  n:'Nguyễn Huệ', g:'red', price:60},
  {t:'chest', n:'Khí Vận'},
  {t:'prop',  n:'Lệ Lợi', g:'red', price:60},
  {t:'tax',   n:'Thuế Thu Nhập', price:200},
  {t:'rail',  n:'Bến Xe Cần Thơ', price:200},
  {t:'prop',  n:'Lương Định Của', g:'gray', price:100},
  {t:'chance',n:'Cơ Hội'},
  {t:'prop',  n:'Võ Thị Sáu', g:'gray', price:100},
  {t:'prop',  n:'Hai Bà Trưng', g:'gray', price:120},
  {t:'jail',  n:'Đang Thăm Tù'},
  {t:'prop',  n:'Nguyễn Tấn Thành', g:'blue', price:140},
  {t:'util',  n:'Công Ty Điện Lực', price:200},
  {t:'prop',  n:'Trần Nguyên Hãn', g:'blue', price:140},
  {t:'prop',  n:'An Dương Vương', g:'blue', price:180},
  {t:'rail',  n:'Bến Xe Miền Tây', price:200},
  {t:'prop',  n:'Hậu Giang', g:'green', price:180},
  {t:'chest', n:'Khí Vận'},
  {t:'prop',  n:'Hùng Vương', g:'green', price:180},
  {t:'prop',  n:'Huỳnh Tấn Phát', g:'green', price:200},
  {t:'park',  n:'Miễn Phí (Đi Xe)'},
  {t:'prop',  n:'Phạm Thế Hiển', g:'orange', price:220},
  {t:'chance',n:'Cơ Hội'},
  {t:'prop',  n:'Kha Vạn Cần', g:'orange', price:220},
  {t:'prop',  n:'Nguyễn Tri Phương', g:'orange', price:240},
  {t:'rail',  n:'Bến Xe Chợ Lớn', price:200},
  {t:'prop',  n:'Lê Đại Hành', g:'yellow', price:260},
  {t:'prop',  n:'Trương Định', g:'yellow', price:260},
  {t:'util',  n:'Công Ty Cấp Nước', price:200},
  {t:'prop',  n:'Hoàng Văn Thụ', g:'yellow', price:280},
  {t:'gojail',n:'Vào Tù'},
  {t:'prop',  n:'Cộng Hòa', g:'cyan', price:300},
  {t:'prop',  n:'Nguyễn Kiệm', g:'cyan', price:300},
  {t:'chest', n:'Khí Vận'},
  {t:'prop',  n:'Quang Trung', g:'cyan', price:320},
  {t:'rail',  n:'Bến Xe Miền Đông', price:200},
  {t:'chance',n:'Cơ Hội'},
  {t:'prop',  n:'Lũy Bán Bích', g:'navy', price:350},
  {t:'tax',   n:'Thuế Đặc Biệt', price:100},
  {t:'prop',  n:'Tân Kỳ Tân Quý', g:'navy', price:400},
];

const TILE_SIZE = 6.4;
const CORNER_SCALE = 1.5;
const CORNER_SIZE = TILE_SIZE*CORNER_SCALE;
const N = 11; // grid slots per side
const BOARD_EXTENT = 2*CORNER_SIZE + 9*TILE_SIZE; // total board width/depth, no overlap

// GO sits at the bottom-left corner (matches the real board photo), running clockwise
function gridPos(index){
  if(index<=10) return {row:10-index, col:0};
  if(index<=20) return {row:0, col:index-10};
  if(index<=30) return {row:index-20, col:10};
  return {row:10, col:10-(index-30)};
}
function isCorner(index){return index%10===0;}
// Maps a 0..10 grid coordinate to a world offset, giving corner slots their own
// (larger) footprint instead of squeezing them into a uniform grid cell — this is
// what was causing corner tiles to overlap ("bite into") their neighbors.
function axisPos(i){
  const half = BOARD_EXTENT/2;
  if(i===0) return -half + CORNER_SIZE/2;
  if(i===10) return half - CORNER_SIZE/2;
  return -half + CORNER_SIZE + (i-1)*TILE_SIZE + TILE_SIZE/2;
}
function tileWorldPos(index){
  const {row,col} = gridPos(index);
  return { x:axisPos(col), z:axisPos(row) };
}

/* ============================= CANVAS TEXTURES ============================= */
function fillTextOutlined(ctx, str, x, y, fillColor, strokeColor, strokeW){
  ctx.lineJoin='round'; ctx.miterLimit=2;
  ctx.strokeStyle = strokeColor || 'rgba(255,255,255,0.9)';
  ctx.lineWidth = strokeW || 5;
  ctx.strokeText(str, x, y);
  ctx.fillStyle = fillColor;
  ctx.fillText(str, x, y);
}
function wrapTextOutlined(ctx, text, cx, cy, maxW, lineH, fillColor, strokeColor, strokeW){
  // Auto-shrink font until every word fits within maxW, so long Vietnamese
  // street names can never overflow past the tile edge.
  const fontMatch = /^(bold\s+)?(\d+)px\s+(.+)$/.exec(ctx.font);
  let size = fontMatch ? parseInt(fontMatch[2],10) : 24;
  const weight = fontMatch && fontMatch[1] ? 'bold ' : '';
  const family = fontMatch ? fontMatch[3] : 'Arial';
  while(size > 13){
    ctx.font = weight+size+'px '+family;
    const words = text.split(' ');
    const tooWide = words.some(w=> ctx.measureText(w).width > maxW);
    if(!tooWide) break;
    size -= 2;
  }
  const words = text.split(' ');
  let lines=[], cur='';
  for(const w of words){
    const test = cur? cur+' '+w : w;
    if(ctx.measureText(test).width > maxW && cur){ lines.push(cur); cur=w; }
    else cur=test;
  }
  if(cur) lines.push(cur);
  const adjLineH = fontMatch ? lineH*(size/parseInt(fontMatch[2],10)) : lineH;
  const startY = cy - (lines.length-1)*adjLineH/2;
  lines.forEach((l,i)=> fillTextOutlined(ctx, l, cx, startY+i*adjLineH, fillColor, strokeColor, strokeW));
}
// Which way a tile's content (color band + text) should face, so every edge of the
// board reads outward with the color band toward the center — like a real printed board.
// Corners sit exactly between their two neighboring edges, facing diagonally outward.
function edgeRotation(index){
  if(index===0)  return  Math.PI/4;      // bottom-left corner (Bắt Đầu) — diagonal
  if(index===10) return  3*Math.PI/4;    // top-left corner
  if(index===20) return -3*Math.PI/4;    // top-right corner
  if(index===30) return -Math.PI/4;      // bottom-right corner
  const {row,col} = gridPos(index);
  if(row===10) return 0;             // bottom edge — reads normally
  if(col===0)  return  Math.PI/2;    // left edge
  if(row===0)  return Math.PI;       // top edge — reads facing up (180°)
  if(col===10) return -Math.PI/2;    // right edge
  return 0;
}
function makeTileCanvas(tile, corner, index){
  const S = 320;
  const cv = document.createElement('canvas'); cv.width=S; cv.height=S;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#faf6ea'; ctx.fillRect(0,0,S,S);

  if(corner){
    let icon='★', bg='#d8cba0';
    if(tile.t==='go'){icon='🚗'; bg='#e0332e';}
    if(tile.t==='jail'){icon='🚔'; bg='#4a86e8';}
    if(tile.t==='park'){icon='🛵'; bg='#2fa84f';}
    if(tile.t==='gojail'){icon='⛓️'; bg='#f5a326';}

    if(tileImgReady[tile.t] && tileImgs[tile.t]){
      // Custom artwork already has its own diagonal baked in — draw it as-is,
      // filling the tile, no extra rotation.
      ctx.drawImage(tileImgs[tile.t], 0, 0, S, S);
      return cv;
    }

    ctx.strokeStyle='#b7a878'; ctx.lineWidth=7; ctx.strokeRect(4,4,S-8,S-8);

    ctx.save();
    ctx.translate(S/2,S/2);
    ctx.rotate(edgeRotation(index));
    ctx.translate(-S/2,-S/2);

    // Colored wedge with its tip pointing toward the board's center (this whole
    // shape rotates with the icon/text, so the tip reliably points inward on
    // every one of the 4 corners, not just by coincidence on one of them).
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.moveTo(S*0.06, S*0.97);
    ctx.lineTo(S*0.94, S*0.97);
    ctx.lineTo(S/2, S*0.4);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle='#00000025'; ctx.lineWidth=4; ctx.stroke();

    ctx.font='54px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(icon, S/2, S*0.24);
    ctx.font='bold 27px Arial';
    wrapTextOutlined(ctx, tile.n, S/2, S*0.8, 210, 30, '#1c1408', '#ffffff', 6);
    ctx.restore();
    return cv;
  }

  ctx.save();
  ctx.translate(S/2,S/2);
  ctx.rotate(edgeRotation(index));
  ctx.translate(-S/2,-S/2);

  if(tile.t==='prop'){

    ctx.font='bold 25px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    wrapTextOutlined(ctx, tile.n, S/2, 138, 264, 30, '#1c1408', '#ffffff', 6);
    ctx.font='bold 32px Arial';
    fillTextOutlined(ctx, 'Giá: $'+tile.price, S/2, 250, '#5a3d18', '#ffffff', 5);
  } else if(tile.t==='rail'){
    if(tileImgReady.rail && tileImgs.rail){
      ctx.drawImage(tileImgs.rail, 0, 0, S, S*0.82);
      ctx.font='bold 20px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
      fillTextOutlined(ctx, 'Giá: $'+tile.price, S/2, S*0.92, '#5a3d18', '#ffffff', 4);
    } else {
      ctx.fillStyle='#2b2b2b'; ctx.fillRect(0,0,S,64);
      ctx.font='52px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('🚌', S/2, 138);
      ctx.font='bold 24px Arial';
      wrapTextOutlined(ctx, tile.n, S/2, 220, 264, 28, '#1c1408', '#ffffff', 6);
      ctx.font='bold 20px Arial';
      fillTextOutlined(ctx, 'Giá: $'+tile.price, S/2, 262, '#5a3d18', '#ffffff', 4);

  } else if(tile.t==='util'){

    wrapTextOutlined(ctx, tile.n, S/2, 195, 264, 28, '#1c1408', '#ffffff', 6);
    ctx.font='bold 20px Arial';
    fillTextOutlined(ctx, 'Giá: $'+tile.price, S/2, 240, '#5a3d18', '#ffffff', 4);
  } else if(tile.t==='chance'){
    ctx.fillStyle='#f5a326';
    ctx.font='bold 112px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    fillTextOutlined(ctx, '?', S/2, 138, '#f5a326', '#5a2c00', 5);
    ctx.font='bold 28px Arial';
    fillTextOutlined(ctx, 'CƠ HỘI', S/2, 250, '#1c1408', '#ffffff', 6);

    ctx.font='72px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';

    ctx.font='bold 28px Arial';

    ctx.font='64px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';

function wrapText(ctx, text, cx, cy, maxW, lineH){
  const words = text.split(' ');
  let lines=[], cur='';
  for(const w of words){
    const test = cur? cur+' '+w : w;
    if(ctx.measureText(test).width > maxW && cur){ lines.push(cur); cur=w; }
    else cur=test;
  }
  if(cur) lines.push(cur);
  const startY = cy - (lines.length-1)*lineH/2;
  lines.forEach((l,i)=> ctx.fillText(l, cx, startY+i*lineH));
}
// An original mascot: a round golden coin-buddy with a money bag. Built entirely
// from basic shapes (no copied artwork), in the spirit of a cheerful money-game mascot.
function drawMascot(ctx, cx, cy, scale){
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);

  // arms (behind the body, holding the bag out to the sides)
  ctx.fillStyle = '#ffcf3e';
  ctx.strokeStyle = '#c98f10'; ctx.lineWidth = 5;
  [-1,1].forEach(side=>{
    ctx.save();
    ctx.translate(side*88, 30);
    ctx.rotate(side*0.55);
    ctx.beginPath(); ctx.ellipse(0,0,17,52,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.restore();
  });

  // money bag between the feet
  ctx.fillStyle = '#e8a622'; ctx.strokeStyle = '#a5691a'; ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(-52, 150);
  ctx.quadraticCurveTo(-70, 205, -30, 235);
  ctx.quadraticCurveTo(0, 250, 30, 235);
  ctx.quadraticCurveTo(70, 205, 52, 150);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(0,150,52,16,0,0,Math.PI*2); ctx.fillStyle='#f2c257'; ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#7a4d10'; ctx.font='bold 54px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('$', 0, 192);

  // head / body (round)
  ctx.fillStyle = '#ffd23f'; ctx.strokeStyle = '#c98f10'; ctx.lineWidth = 6;
  ctx.beginPath(); ctx.arc(0,0,98,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // cheeks
  ctx.fillStyle = '#ffb86b';
  ctx.beginPath(); ctx.ellipse(-55,25,16,10,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(55,25,16,10,0,0,Math.PI*2); ctx.fill();

  // eyes
  ctx.fillStyle = '#2b2013';
  ctx.beginPath(); ctx.arc(-30,-12,11,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(30,-12,11,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-26,-16,3.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(34,-16,3.5,0,Math.PI*2); ctx.fill();

  // big grin
  ctx.strokeStyle = '#2b2013'; ctx.lineWidth = 7; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(0, 6, 44, 0.12*Math.PI, 0.88*Math.PI); ctx.stroke();

  // two little antennae (playful, generic — not copied from any specific character)
  ctx.strokeStyle = '#2b2013'; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(-20,-92); ctx.quadraticCurveTo(-35,-140,-15,-155); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(20,-92); ctx.quadraticCurveTo(35,-140,15,-155); ctx.stroke();
  ctx.fillStyle = '#ffd23f'; ctx.strokeStyle='#c98f10'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.arc(-15,-158,10,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(15,-158,10,0,Math.PI*2); ctx.fill(); ctx.stroke();

  ctx.restore();
}
function makeCenterBgCanvas(){
  const S=1024;
  const cv=document.createElement('canvas'); cv.width=S; cv.height=S;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#f6f1e2'; ctx.fillRect(0,0,S,S);
  ctx.strokeStyle='#c9bc98'; ctx.lineWidth=10; ctx.strokeRect(20,20,S-40,S-40);
  return cv;
}

const tileImgs = {};
const tileImgReady = {};
Object.keys(TILE_IMG_B64).forEach(key=>{
  const img = new Image();
  img.onload = ()=>{ tileImgReady[key] = true; refreshTilesUsingImage(key); };
  img.src = 'data:image/jpeg;base64,' + TILE_IMG_B64[key];
  tileImgs[key] = img;
});
const tileTextures = new Array(40).fill(null); // populated once tiles are built
function refreshTilesUsingImage(key){
  for(let i=0;i<40;i++){
    if(!tileTextures[i]) continue;
    const t = TILES[i];
    const matches = (key==='rail' && t.t==='rail') || (key===t.t);
    if(matches){
      tileTextures[i].image = makeTileCanvas(t, isCorner(i), i);
      tileTextures[i].needsUpdate = true;
    }
  }
}

function makeLogoCanvas(){
  const S=768;
  const cv=document.createElement('canvas'); cv.width=S; cv.height=S;
  drawLogoContent(cv);
  return cv;
}
function drawLogoContent(cv){
  const S = cv.width;
  const ctx = cv.getContext('2d');
  ctx.clearRect(0,0,S,S); // transparent so only the mascot+title show, no visible square edge
  if(mascotReady && mascotImg.naturalWidth>0){
    const iw=mascotImg.naturalWidth, ih=mascotImg.naturalHeight;
    const maxW=S*0.72, maxH=S*0.62;
    const scale = Math.min(maxW/iw, maxH/ih);
    const w=iw*scale, h=ih*scale;
    ctx.drawImage(mascotImg, S/2-w/2, S/2-h/2-60, w, h);
  } else {
    drawMascot(ctx, S/2, S/2-70, 0.85); // fallback while the photo loads
  }
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#c0293d'; ctx.font='bold 70px Arial';
  ctx.fillText('CỜ TỶ PHÚ!', S/2, S/2+150);
}
function makeDeckCanvas(label, color){
  const W=320, H=200;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');
  ctx.fillStyle=color; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#00000040'; ctx.lineWidth=8; ctx.strokeRect(4,4,W-8,H-8);
  ctx.fillStyle='#fff'; ctx.font='bold 40px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(label, W/2, H/2);
  return cv;
}

/* ---- Property ownership ---- */
const ownership = new Array(40).fill(null); // playerIndex or null
const ownerMarkers = new Array(40).fill(null);
const STATION_RENT = [0, 25, 50, 100, 200]; // by count of stations the owner holds
function rentFor(tile, ownerIdx){
  if(tile.t==='rail'){
    let count = 0;
    for(let i=0;i<40;i++){ if(TILES[i].t==='rail' && ownership[i]===ownerIdx) count++; }
    return STATION_RENT[count] || 200;
  }
  if(tile.t==='util'){
    let count = 0;
    for(let i=0;i<40;i++){ if(TILES[i].t==='util' && ownership[i]===ownerIdx) count++; }
    return lastRollSum * (count>=2 ? 10 : 4);
  }
  return Math.round(tile.price*0.2);
}
function addOwnerMarker(tileIdx, playerIdx){
  if(ownerMarkers[tileIdx]) scene.remove(ownerMarkers[tileIdx]);
  const {x,z} = tileWorldPos(tileIdx);
  const h = isCorner(tileIdx) ? 1.0 : 0.7;
  const marker = new THREE.Mesh(
    new THREE.CylinderGeometry(0.75,0.75,0.28,18),
    new THREE.MeshStandardMaterial({color:PLAYER_COLORS[playerIdx], emissive:PLAYER_COLORS[playerIdx], emissiveIntensity:0.3, roughness:0.4})
  );
  marker.position.set(x, h+0.16, z);
  marker.castShadow = true;
  scene.add(marker);
  ownerMarkers[tileIdx] = marker;
}
function buyProperty(playerIdx, tileIdx){
  const tile = TILES[tileIdx];
  players[playerIdx].cash -= tile.price;
  ownership[tileIdx] = playerIdx;
  addOwnerMarker(tileIdx, playerIdx);
  updateHUD();
}

/* ============================= CAMERA (custom orbit) ============================= */
let camTarget = new THREE.Vector3(0,0,0);
let camRadius = boardSize*0.95;
let camTheta = Math.PI/4;   // horizontal
let camPhi = 0.95;          // vertical (from up axis)
let followMode = false;

function updateCameraFromSpherical(){
  const p = new THREE.Vector3().setFromSphericalCoords(camRadius, camPhi, camTheta);
  camera.position.copy(camTarget).add(p);
  camera.lookAt(camTarget);
}
updateCameraFromSpherical();

let dragging=false, lastX=0, lastY=0;
renderer.domElement.addEventListener('pointerdown', e=>{
  dragging=true; lastX=e.clientX; lastY=e.clientY;
  renderer.domElement.setPointerCapture(e.pointerId);
});
renderer.domElement.addEventListener('pointermove', e=>{
  if(!dragging) return;
  const dx=e.clientX-lastX, dy=e.clientY-lastY;
  lastX=e.clientX; lastY=e.clientY;
  camTheta -= dx*0.006;
  camPhi = Math.min(1.45, Math.max(0.25, camPhi - dy*0.006));
  if(!followMode) updateCameraFromSpherical();
});
window.addEventListener('pointerup', ()=>dragging=false);
renderer.domElement.addEventListener('wheel', e=>{
  camRadius = Math.min(boardSize*1.9, Math.max(boardSize*0.35, camRadius + e.deltaY*0.05));
  if(!followMode) updateCameraFromSpherical();
  e.preventDefault();
}, {passive:false});

document.getElementById('cam-overview').onclick = ()=>{
  followMode=false;
  document.getElementById('cam-overview').classList.add('active');
  document.getElementById('cam-follow').classList.remove('active');
  camTarget.set(0,0,0);
  updateCameraFromSpherical();
};
document.getElementById('cam-follow').onclick = ()=>{
  followMode=true;
  document.getElementById('cam-follow').classList.add('active');
  document.getElementById('cam-overview').classList.remove('active');
};

/* ============================= PHYSICS DICE ============================= */
const world = new CANNON.World();
world.gravity.set(0,-52,0);
world.broadphase = new CANNON.NaiveBroadphase();
world.solver.iterations = 14;

const groundMat = new CANNON.Material('ground');
const diceMat = new CANNON.Material('dice');
world.addContactMaterial(new CANNON.ContactMaterial(groundMat, diceMat, {friction:0.42, restitution:0.55}));

const groundBody = new CANNON.Body({mass:0, material:groundMat});
groundBody.addShape(new CANNON.Plane());
groundBody.quaternion.setFromEuler(-Math.PI/2,0,0);
groundBody.position.set(0, 0.02, 0);
world.addBody(groundBody);

const trayHalf = TILE_SIZE*2.0;
function addBoxWall(x,z,hx,hz){
  const body = new CANNON.Body({mass:0, material:groundMat});
  body.addShape(new CANNON.Box(new CANNON.Vec3(hx,4,hz)));
  body.position.set(x,4,z);
  world.addBody(body);
}
const wt = 0.6;
addBoxWall(trayHalf+wt, 0, wt, trayHalf+wt);
addBoxWall(-trayHalf-wt, 0, wt, trayHalf+wt);
addBoxWall(0, trayHalf+wt, trayHalf+wt, wt);
addBoxWall(0, -trayHalf-wt, trayHalf+wt, wt);

// die pip textures: material order [+x,-x,+y,-y,+z,-z] -> values [2,5,1,6,3,4]
function pipCanvas(n){
  const S=128; const cv=document.createElement('canvas'); cv.width=S; cv.height=S;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#f7f3e8'; ctx.fillRect(0,0,S,S);
  ctx.strokeStyle='#00000022'; ctx.lineWidth=4; ctx.strokeRect(2,2,S-4,S-4);
  ctx.fillStyle='#a5271f';
  const pip=(x,y)=>{ ctx.beginPath(); ctx.arc(x,y,11,0,7); ctx.fill(); };
  const c=S/2, o=32;
  const layouts = {
    1:[[c,c]],
    2:[[c-o,c-o],[c+o,c+o]],
    3:[[c-o,c-o],[c,c],[c+o,c+o]],
    4:[[c-o,c-o],[c+o,c-o],[c-o,c+o],[c+o,c+o]],
    5:[[c-o,c-o],[c+o,c-o],[c,c],[c-o,c+o],[c+o,c+o]],
    6:[[c-o,c-o],[c+o,c-o],[c-o,c],[c+o,c],[c-o,c+o],[c+o,c+o]]
  };
  layouts[n].forEach(([x,y])=>pip(x,y));
  return cv;
}
const dieFaceOrder = [2,5,1,6,3,4]; // +x,-x,+y,-y,+z,-z
const dieMaterials = dieFaceOrder.map(n=> new THREE.MeshStandardMaterial({map:tex(pipCanvas(n)), roughness:0.45}));
const axisTable = [
  {dir:new THREE.Vector3(1,0,0), val:2},
  {dir:new THREE.Vector3(-1,0,0), val:5},
  {dir:new THREE.Vector3(0,1,0), val:1},
  {dir:new THREE.Vector3(0,-1,0), val:6},
  {dir:new THREE.Vector3(0,0,1), val:3},
  {dir:new THREE.Vector3(0,0,-1), val:4},
];
function getDieValue(mesh){
  let best=-Infinity, val=1;
  axisTable.forEach(a=>{
    const wd = a.dir.clone().applyQuaternion(mesh.quaternion);
    if(wd.y>best){best=wd.y; val=a.val;}
  });
  return val;
}

function makeDie(){
  const geo = new THREE.BoxGeometry(1.8,1.8,1.8);
  const mesh = new THREE.Mesh(geo, dieMaterials);
  mesh.castShadow=true; mesh.receiveShadow=true;
  scene.add(mesh);
  const shape = new CANNON.Box(new CANNON.Vec3(0.9,0.9,0.9));
  const body = new CANNON.Body({mass:1, material:diceMat, shape});
  body.angularDamping = 0.58; body.linearDamping = 0.5;
  world.addBody(body);
  return {mesh, body};
}
const dice = [makeDie(), makeDie()];

function throwDice(){
  dice.forEach((d,i)=>{
    d.body.wakeUp();
    d.body.position.set(-2.4 + i*4.8, 13+Math.random()*2, -2+Math.random()*4);
    d.body.velocity.set((Math.random()-0.5)*6, -3, (Math.random()-0.5)*6);
    d.body.angularVelocity.set((Math.random()-0.5)*26,(Math.random()-0.5)*26,(Math.random()-0.5)*26);
    d.body.quaternion.setFromEuler(Math.random()*Math.PI,Math.random()*Math.PI,Math.random()*Math.PI);
  });
}

let physicsActive = false, settleTimer = 0, rollElapsed = 0;
const MAX_ROLL_TIME = 2.7; // a touch longer so the roll doesn't feel cut short vs the sound
function finishRoll(){
  physicsActive = false;
  rolling = false;
  playSfx('land');
  const v1=getDieValue(dice[0].mesh), v2=getDieValue(dice[1].mesh);
  document.getElementById('die1').textContent=v1;
  document.getElementById('die2').textContent=v2;
  onDiceSettled(v1+v2, v1===v2);
}
function stepPhysics(dt){
  if(!physicsActive) return;
  world.step(1/60, dt, 4);
  dice.forEach(d=>{
    d.mesh.position.copy(d.body.position);
    d.mesh.quaternion.copy(d.body.quaternion);
  });
  rollElapsed += dt;
  const stillAll = dice.every(d=> d.body.velocity.length()<0.15 && d.body.angularVelocity.length()<0.15);
  if(stillAll){
    settleTimer += dt;
    if(settleTimer>0.35) finishRoll();
  } else {
    settleTimer=0;
    if(rollElapsed>MAX_ROLL_TIME){
      // force-stop: freeze bodies in place so the shown value matches what's rendered
      dice.forEach(d=>{ d.body.velocity.set(0,0,0); d.body.angularVelocity.set(0,0,0); });
      finishRoll();
    }
  }
}

// Two fully independent audio pipelines so music never interferes with dice/move sounds:
// 1) Background music = the YouTube video (its own <iframe>, own volume, controlled via postMessage)
// 2) Sound effects (dice, hops, cards) = Web Audio, synthesized locally, unaffected by the music
let audioCtx = null, sfxGain = null;
let musicEnabled = true, sfxEnabled = true;
const ytFrame = document.getElementById('yt-bg');

function ytCmd(func, args){
  try{ ytFrame.contentWindow.postMessage(JSON.stringify({event:'command', func, args: args||''}), '*'); }
  catch(e){}
}
function applyMusicState(){
  if(musicEnabled){ ytCmd('unMute'); ytCmd('setVolume',[14]); ytCmd('playVideo'); }
  else { ytCmd('mute'); }
}

function ensureAudio(){
  if(audioCtx) { if(audioCtx.state==='suspended') audioCtx.resume(); return; }
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if(!Ctx) return;
  audioCtx = new Ctx();
  sfxGain = audioCtx.createGain(); sfxGain.gain.value = sfxEnabled?1:0; sfxGain.connect(audioCtx.destination);
  loadDiceThrowBuffer();
}
let diceThrowBuffer = null;
function loadDiceThrowBuffer(){
  if(diceThrowBuffer || !audioCtx) return;
  try{
    const binary = atob(DICE_THROW_B64);
    const bytes = new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
    audioCtx.decodeAudioData(bytes.buffer, (buf)=>{ diceThrowBuffer = buf; }, ()=>{ diceThrowBuffer = null; });
  }catch(e){ diceThrowBuffer = null; }
}
function playDiceThrowSound(){
  if(!sfxEnabled || !audioCtx || !diceThrowBuffer) return false;
  const src = audioCtx.createBufferSource();
  src.buffer = diceThrowBuffer;
  src.playbackRate.value = 0.88; // stretch slightly to cover the longer, livelier roll
  const g = audioCtx.createGain(); g.gain.value = 0.85;
  src.connect(g); g.connect(sfxGain);
  src.start();
  return true;
}
function playTone(freq, duration, gainNode, type, vol){
  if(!audioCtx || !gainNode) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type||'sine'; osc.frequency.value = freq;
  g.gain.value = 0;
  osc.connect(g); g.connect(gainNode);
  const t = audioCtx.currentTime;
  g.gain.linearRampToValueAtTime(vol||0.15, t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t+duration);
  osc.start(t); osc.stop(t+duration+0.05);
}
function playSfx(type){
  if(!sfxEnabled || !audioCtx) return;
  if(type==='roll'){
    playDiceThrowSound();
  } else if(type==='hop'){
    playTone(520,0.09,sfxGain,'triangle',0.13);
  } else if(type==='land'){
    playTone(660,0.12,sfxGain,'sine',0.15);
    setTimeout(()=>playTone(880,0.15,sfxGain,'sine',0.13),90);
  } else if(type==='jail'){
    playTone(150,0.35,sfxGain,'sawtooth',0.12);
  } else if(type==='go'){
    playTone(784,0.1,sfxGain,'sine',0.16);
    setTimeout(()=>playTone(988,0.16,sfxGain,'sine',0.15),100);
  } else if(type==='card'){
    playTone(600,0.08,sfxGain,'triangle',0.14);
    setTimeout(()=>playTone(760,0.1,sfxGain,'triangle',0.12),70);
  }
}
function setMusicEnabled(on){
  musicEnabled = on;
  applyMusicState();
  document.getElementById('music-toggle').classList.toggle('active', on);
  document.getElementById('setup-music').classList.toggle('active', on);
  document.getElementById('setup-music').textContent = '🎵 Nhạc nền: '+(on?'Bật':'Tắt');
}
function setSfxEnabled(on){
  sfxEnabled = on;
  if(sfxGain) sfxGain.gain.value = on?1:0;
  document.getElementById('sfx-toggle').classList.toggle('active', on);
  document.getElementById('setup-sfx').classList.toggle('active', on);
  document.getElementById('setup-sfx').textContent = '🔊 Hiệu ứng: '+(on?'Bật':'Tắt');
}
document.getElementById('music-toggle').onclick = ()=> setMusicEnabled(!musicEnabled);
document.getElementById('sfx-toggle').onclick = ()=> setSfxEnabled(!sfxEnabled);
document.getElementById('setup-music').onclick = ()=> setMusicEnabled(!musicEnabled);
document.getElementById('setup-sfx').onclick = ()=> setSfxEnabled(!sfxEnabled);

/* ============================= SETUP SCREEN (player count + human/bot) ============================= */
const slotList = document.getElementById('slot-list');
function renderSlots(){
  slotList.innerHTML = '';
  for(let i=0;i<playerCount;i++){
    const p = players[i];
    const row = document.createElement('div');
    row.className = 'slot-row';
    row.innerHTML =
      '<div class="slot-dot" style="background:#'+p.color.toString(16).padStart(6,'0')+'"></div>'+
      '<div class="slot-name">'+p.name+'</div>'+
      '<div class="slot-toggle">'+
        '<button data-role="human" class="'+(!p.isBot?'active':'')+'">Người</button>'+
        '<button data-role="bot" class="'+(p.isBot?'active bot':'')+'">Bot</button>'+
      '</div>';
    row.querySelectorAll('button').forEach(btn=>{
      btn.onclick = ()=>{
        p.isBot = btn.dataset.role==='bot';
        renderSlots();
      };
    });
    slotList.appendChild(row);
  }
}
renderSlots();
document.querySelectorAll('.count-btn').forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll('.count-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    playerCount = parseInt(btn.dataset.n,10);
    renderSlots();
  };
});

function applyPlayerCountToScene(){
  for(let i=0;i<4;i++){
    const active = i<playerCount;
    tokens[i].visible = active;
    const card = document.getElementById('p'+i);
    card.style.display = active? 'flex' : 'none';
  }
}

document.getElementById('start-btn').onclick = ()=>{
  ensureAudio();
  setMusicEnabled(musicEnabled);
  setSfxEnabled(sfxEnabled);
  applyPlayerCountToScene();
  document.getElementById('setup-overlay').style.display = 'none';
  currentPlayer = 0;
  updateHUD();
  maybeBotTurn();
};

/* ============================= GAME / TURN LOGIC ============================= */
let currentPlayer = 0;
let animating = false;
let rolling = false;
let doublesStreak = 0;
const rollBtn = document.getElementById('roll-btn');

function updateHUD(){
  document.querySelectorAll('.player-card').forEach((el,i)=>{
    if(i>=playerCount) return;
    el.classList.toggle('active', i===currentPlayer);
    document.getElementById('p'+i+'-info').textContent =
      (players[i].isBot?'🤖 ':'')+'💰 $'+players[i].cash+' · '+TILES[players[i].pos].n;
  });
  document.getElementById('turn-name').textContent =
    (players[currentPlayer].isBot?'🤖 ':'')+players[currentPlayer].name;
}
updateHUD();

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(showToast._h);
  showToast._h = setTimeout(()=>t.classList.remove('show'), 2600);
}

/* ---- Cơ Hội (Chance) & Khí Vận (Community Chest) card decks ---- */
const CARD_CHANCE = [
  {text:'Tiến đến Ô Bắt Đầu, nhận $200.', type:'goto', value:0},
  {text:'Ngân hàng trả cổ tức cho bạn, nhận $50.', type:'gain', value:50},
  {text:'Bạn trúng số, nhận $100.', type:'gain', value:100},
  {text:'Bạn vi phạm giao thông, nộp phạt $15.', type:'pay', value:15},
  {text:'Đi lùi lại 3 ô.', type:'back', value:3},
  {text:'Tiến thêm 2 ô về phía trước.', type:'forward', value:2},
  {text:'Bị bắt vào tù ngay lập tức!', type:'jail'},
  {text:'Bảo trì đường xá, trả $40.', type:'pay', value:40},
  {text:'Thẻ "Ra tù miễn phí" - giữ lại để dùng khi cần.', type:'getOutOfJail'},
];
const CARD_CHEST = [
  {text:'Quỹ từ thiện hoàn trả, nhận $25.', type:'gain', value:25},
  {text:'Bạn được miễn học phí, nhận $50.', type:'gain', value:50},
  {text:'Đóng viện phí, trả $50.', type:'pay', value:50},
  {text:'Đóng học phí cho con, trả $50.', type:'pay', value:50},
  {text:'Sinh nhật vui vẻ! Mỗi người chơi khác tặng bạn $10.', type:'collectAll', value:10},
  {text:'Trả lương nhân viên, mỗi người chơi khác thu của bạn $20.', type:'payAll', value:20},
  {text:'Tiến đến Ô Bắt Đầu, nhận $200.', type:'goto', value:0},
  {text:'Bán được cổ phiếu, nhận $75.', type:'gain', value:75},
  {text:'Nộp thuế bảo hiểm, trả $30.', type:'pay', value:30},
];
function drawCard(deckType){
  const deck = deckType==='chance' ? CARD_CHANCE : CARD_CHEST;
  return deck[Math.floor(Math.random()*deck.length)];
}

/* ---- Card draw effect: on-screen popup + gentle female voice read-aloud ---- */
let ttsVoices = [];
function refreshTtsVoices(){
  try{ ttsVoices = window.speechSynthesis ? window.speechSynthesis.getVoices() : []; }catch(e){ ttsVoices = []; }
}
if('speechSynthesis' in window){
  refreshTtsVoices();
  window.speechSynthesis.onvoiceschanged = refreshTtsVoices;
}
function pickGentleFemaleVoice(){
  if(!ttsVoices.length) refreshTtsVoices();
  const vi = ttsVoices.filter(v=>v.lang && v.lang.toLowerCase().startsWith('vi'));
  if(!vi.length) return null;
  // Chrome/Android ship a soft female Vietnamese voice, usually named
  // "Google Tiếng Việt" / "Google Vietnamese" — prefer that one specifically.
  const google = vi.find(v=>/google/i.test(v.name));
  if(google) return google;
  const female = vi.find(v=>/female|nữ|hoai|linh|mai|huong|an|thu/i.test(v.name));
  return female || vi[0];
}
function speakCardText(text){
  if(!sfxEnabled || !('speechSynthesis' in window)) return;
  try{
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    const voice = pickGentleFemaleVoice();
    if(voice){ utter.voice = voice; utter.lang = voice.lang; } else { utter.lang = 'vi-VN'; }
    utter.pitch = 1.15; utter.rate = 0.9; utter.volume = 0.9;
    window.speechSynthesis.speak(utter);
  }catch(e){}
}
function showCardPopup(deckType, text){
  const popup = document.getElementById('card-popup');
  document.getElementById('cp-icon').textContent = deckType==='chance' ? '❓' : '🎁';
  document.getElementById('cp-label').textContent = deckType==='chance' ? 'CƠ HỘI' : 'KHÍ VẬN';
  document.getElementById('cp-text').textContent = text;
  popup.className = deckType; // resets then re-adds base class for styling
  popup.classList.add(deckType, 'show');
  speakCardText(text);
  clearTimeout(showCardPopup._h);
  showCardPopup._h = setTimeout(()=>popup.classList.remove('show'), 2600);
}

function doRoll(){
  if(animating || rolling) return;
  rolling = true;
  rollBtn.disabled = true;
  document.getElementById('die1').textContent='?';
  document.getElementById('die2').textContent='?';
  playSfx('roll');
  throwDice();
  physicsActive = true; settleTimer = 0; rollElapsed = 0;
}
rollBtn.addEventListener('click', doRoll);

function maybeBotTurn(){
  rolling = false;
  const isBot = players[currentPlayer].isBot;
  rollBtn.disabled = isBot;
  rollBtn.textContent = isBot ? '🤖 Bot đang suy nghĩ...' : '🎲 Tung xúc xắc';
  if(isBot){
    setTimeout(()=>{ if(!animating) doRoll(); }, 900);
  }
}

let pendingExtraTurn = false;
let lastRollSum = 0;
function onDiceSettled(sum, isDoubles){
  lastRollSum = sum;
  if(isDoubles){
    doublesStreak++;
    if(doublesStreak>=3){
      doublesStreak = 0;
      pendingExtraTurn = false;
      const p = players[currentPlayer];
      animating = true;
      goToTile(currentPlayer, 10, {awardPassGo:false}, ()=>{
        playSfx('jail');
        showToast(p.name+' đổ đôi 3 lần liên tiếp — bị bắt vào Tù!');
        updateHUD();
        endTurn();
      });
      return;
    }
    pendingExtraTurn = true;
  } else {
    doublesStreak = 0;
    pendingExtraTurn = false;
  }
  moveToken(currentPlayer, sum);
}

function tokenTargetPos(playerIdx, tileIdx){
  const {x,z} = tileWorldPos(tileIdx);
  const o = OFFSETS[playerIdx];
  return new THREE.Vector3(x+o[0], 0.7, z+o[1]);
}

function endTurn(){
  animating = false;
  if(pendingExtraTurn){
    pendingExtraTurn = false;
    updateHUD();
    showToast('🎲 '+players[currentPlayer].name+' đổ đôi — được đi thêm lượt!');
    maybeBotTurn();
    return;
  }
  currentPlayer = (currentPlayer+1)%playerCount;
  updateHUD();
  maybeBotTurn();
}

// Move a token directly to a target tile (used by cards, not the normal dice hop-by-hop walk)
function goToTile(playerIdx, targetIdx, opts, callback){
  const p = players[playerIdx];
  const startPos = p.pos;
  const passedGo = opts.awardPassGo && targetIdx <= startPos;
  p.pos = targetIdx;
  const tok = tokens[playerIdx];
  const from = tok.position.clone();
  const to = tokenTargetPos(playerIdx, targetIdx);
  playSfx('hop');
  animateHop(tok, from, to, 320, ()=>{
    if(passedGo){
      p.cash += 200;
      playSfx('go');
      showToast(p.name+' đi qua Ô Bắt Đầu, nhận $200!');
    }
    callback();
  });
}

function applyCard(playerIdx, deckType, card){
  const p = players[playerIdx];
  playSfx('card');
  showCardPopup(deckType, (p.isBot?'🤖 '+p.name+': ':'')+card.text);
  setTimeout(()=>{
    if(card.type==='gain'){
      p.cash += card.value; updateHUD(); endTurn();
    } else if(card.type==='pay'){
      p.cash -= card.value; updateHUD(); playSfx('jail'); endTurn();
    } else if(card.type==='collectAll'){
      let total=0;
      for(let i=0;i<playerCount;i++){ if(i!==playerIdx){ players[i].cash-=card.value; total+=card.value; } }
      p.cash += total; updateHUD(); endTurn();
    } else if(card.type==='payAll'){
      let total=0;
      for(let i=0;i<playerCount;i++){ if(i!==playerIdx){ players[i].cash+=card.value; total+=card.value; } }
      p.cash -= total; updateHUD(); playSfx('jail'); endTurn();
    } else if(card.type==='getOutOfJail'){
      p.jailCard = (p.jailCard||0)+1; updateHUD(); endTurn();
    } else if(card.type==='goto'){
      goToTile(playerIdx, card.value, {awardPassGo:true}, ()=>{ updateHUD(); endTurn(); });
    } else if(card.type==='forward'){
      goToTile(playerIdx, (p.pos + card.value)%40, {awardPassGo:true}, ()=>{ updateHUD(); endTurn(); });
    } else if(card.type==='back'){
      goToTile(playerIdx, (p.pos - card.value + 40)%40, {awardPassGo:false}, ()=>{ updateHUD(); endTurn(); });
    } else if(card.type==='jail'){
      goToTile(playerIdx, 10, {awardPassGo:false}, ()=>{
        playSfx('jail'); showToast(p.name+' bị bắt vào tù!');
        doublesStreak=0; pendingExtraTurn=false;
        updateHUD(); endTurn();
      });
    } else {
      endTurn();
    }
  }, 1400);
}

function showBuyPrompt(playerIdx, tileIdx){
  const tile = TILES[tileIdx];
  const p = players[playerIdx];
  document.getElementById('buy-title').textContent = (p.isBot?'🤖 ':'')+p.name+': Mua '+tile.n+'?';
  document.getElementById('buy-price').textContent = 'Giá: $'+tile.price+' · Tiền hiện có: $'+p.cash;
  const overlay = document.getElementById('buy-overlay');
  overlay.style.display = 'flex';
  document.getElementById('buy-yes').onclick = ()=>{
    overlay.style.display = 'none';
    if(p.cash >= tile.price){
      buyProperty(playerIdx, tileIdx);
      showToast(p.name+' đã mua '+tile.n+'!');
      playSfx('land');
    } else {
      showToast('Không đủ tiền để mua '+tile.n+'!');
    }
    endTurn();
  };
  document.getElementById('buy-no').onclick = ()=>{
    overlay.style.display = 'none';
    showToast(p.name+' bỏ qua '+tile.n);
    endTurn();
  };
}

function afterLanding(playerIdx){
  const p = players[playerIdx];
  const tile = TILES[p.pos];
  updateHUD();
  if(tile.t==='prop'||tile.t==='rail'||tile.t==='util'){
    const owner = ownership[p.pos];
    if(owner===null){
      if(p.isBot){
        if(p.cash - tile.price > 250){
          buyProperty(playerIdx, p.pos);
          showToast(p.name+' đã mua '+tile.n+' với giá $'+tile.price);
        } else {
          showToast(p.name+' bỏ qua '+tile.n);
        }
        endTurn();
      } else {
        showBuyPrompt(playerIdx, p.pos);
      }
    } else if(owner!==playerIdx){
      const rent = rentFor(tile, owner);
      p.cash -= rent; players[owner].cash += rent;
      updateHUD();
      showToast(p.name+' trả tiền thuê $'+rent+' cho '+players[owner].name);
      playSfx('jail');
      endTurn();
    } else {
      showToast(p.name+' dừng tại '+tile.n+' (đất của bạn)');
      endTurn();
    }
  } else if(tile.t==='tax'){
    p.cash -= tile.price; updateHUD();
    showToast(p.name+' đóng '+tile.n+': -$'+tile.price);
    endTurn();
  } else if(tile.t==='gojail'){
    p.pos = 10; updateHUD();
    playSfx('jail');
    showToast(p.name+' bị đưa vào Tù!');
    const to = tokenTargetPos(playerIdx, 10);
    tokens[playerIdx].position.copy(to);
    doublesStreak=0; pendingExtraTurn=false;
    endTurn();
  } else if(tile.t==='chance'){
    applyCard(playerIdx, 'chance', drawCard('chance'));
  } else if(tile.t==='chest'){
    applyCard(playerIdx, 'chest', drawCard('chest'));
  } else {
    endTurn();
  }
}

function moveToken(playerIdx, steps){
  animating = true;
  const startPos = players[playerIdx].pos;
  let hop = 0;
  const tok = tokens[playerIdx];

  function nextHop(){
    if(hop>=steps){
      afterLanding(playerIdx);
      return;
    }
    hop++;
    const newIdx = (startPos+hop)%40;
    players[playerIdx].pos = newIdx;
    playSfx('hop');
    if(newIdx===0){
      players[playerIdx].cash += 200;
      playSfx('go');
      showToast(players[playerIdx].name+' đi qua Ô Xuất Phát, nhận $200!');
    }
    const from = tok.position.clone();
    const to = tokenTargetPos(playerIdx, newIdx);
    animateHop(tok, from, to, 180, nextHop);
  }
  nextHop();
}

function animateHop(tok, from, to, duration, done){
  const t0 = performance.now();
  const arcH = 1.6;
  function step(now){
    const t = Math.min(1, (now-t0)/duration);
    const ease = t<0.5? 2*t*t : -1+(4-2*t)*t;
    tok.position.x = from.x + (to.x-from.x)*ease;
    tok.position.z = from.z + (to.z-from.z)*ease;
    tok.position.y = 0.7 + Math.sin(Math.PI*t)*arcH;
    if(t<1) requestAnimationFrame(step); else { tok.position.copy(to); done(); }
  }
  requestAnimationFrame(step);
}

/* ============================= MAIN LOOP ============================= */
let lastT = performance.now();
function animate(now){
  requestAnimationFrame(animate);
  const dt = Math.min(0.05,(now-lastT)/1000);
  lastT = now;
  stepPhysics(dt);

  // Blinking arrow above whoever currently has the turn
  const curTok = tokens[currentPlayer];
  if(curTok && curTok.visible){
    turnArrowGroup.visible = true;
    turnArrowGroup.position.set(curTok.position.x, curTok.position.y + 3.6 + Math.sin(now*0.004)*0.35, curTok.position.z);
    turnArrowGroup.rotation.y += 0.04;
    turnArrowMat.opacity = 0.5 + 0.5*Math.sin(now*0.007);
  } else {
    turnArrowGroup.visible = false;
  }

  if(followMode){
    const tok = tokens[currentPlayer];
    const desired = new THREE.Vector3(tok.position.x, tok.position.y, tok.position.z);
    camTarget.lerp(desired, 0.08);
    camRadius = THREE.MathUtils.lerp(camRadius, TILE_SIZE*6, 0.05);
    camPhi = THREE.MathUtils.lerp(camPhi, 0.75, 0.05);
    updateCameraFromSpherical();
  }

  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

})();
</script>
